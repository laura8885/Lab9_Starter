<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({
      token: "38865873644f4575a461a126d704da79"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>

</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>

        <input name="first-num" id="first-num" />

        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>

        <input name="second-num" id="second-num" />

        <button id="calculate">Calculate</button>

        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>

    class ValidationError extends Error {
      constructor(message) {
        super(message);
        this.name = "ValidationError";
      }
    }

    let form = document.querySelector('form');

    form.addEventListener('submit', e => {
      e.preventDefault();

      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value.trim();
      let secondNum = document.querySelector('#second-num').value.trim();
      let operator = document.querySelector('#operator').value;

      try {

        if (firstNum === '') {
          throw new ValidationError("First number cannot be empty.");
        }

        if (secondNum === '') {
          throw new ValidationError("Second number cannot be empty.");
        }

        let num1 = Number(firstNum);
        let num2 = Number(secondNum);

        if (isNaN(num1) || isNaN(num2)) {
          throw new ValidationError("Inputs must be valid numbers.");
        }

        if (operator === '/' && num2 === 0) {
          throw new ValidationError("Cannot divide by zero.");
        }

        let result = eval(`${num1} ${operator} ${num2}`);

        output.textContent = result;

      } catch (err) {

        console.error(`${err.name}: ${err.message}`);
        output.textContent = err.message;

      } finally {

        console.log("Calculation attempted.");

      }
    });


    let errorBtns = Array.from(
      document.querySelectorAll('#error-btns > button')
    );

    errorBtns[0].addEventListener('click', () => {
      console.log("This is a console.log demonstration.");
    });

    errorBtns[1].addEventListener('click', () => {
      console.error("This is a console.error demonstration.");
    });

    errorBtns[2].addEventListener('click', () => {
      console.count("Count Button");
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn("This is a console.warn demonstration.");
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(2 + 2 === 5, "Assertion failed: 2 + 2 is not 5");
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', () => {
      console.dir(document.querySelector('form'));
    });

    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.body);
    });

    errorBtns[8].addEventListener('click', () => {

      console.group("Student Information");

      console.log("Name: Student");
      console.log("Course: CSE 110");
      console.log("Lab: 9");

    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {

      console.table([
        { Name: "Alice", Score: 95 },
        { Name: "Bob", Score: 87 },
        { Name: "Charlie", Score: 91 }
      ]);

    });

    errorBtns[11].addEventListener('click', () => {
      console.time("demoTimer");
      console.log("Timer started.");
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd("demoTimer");
    });

    errorBtns[13].addEventListener('click', () => {
      console.trace("Trace demonstration");
    });

    errorBtns[14].addEventListener('click', () => {

      nonExistentObject.someMethod();

    });

    window.onerror = function (
      message,
      source,
      lineno,
      colno,
      error
    ) {

      console.error("Global Error Caught!");
      console.error("Message:", message);
      console.error("Line:", lineno);

      return true;
    };

  </script>
</body>

</html>
